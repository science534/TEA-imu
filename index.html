<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Registrasi - The Editor of Astronomy</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #050508;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            padding-bottom: 40px;
        }

        #tornado-container { width: 110px; height: 110px; margin-top: 15px; }
        canvas#tornado { width: 100%; height: 100%; filter: drop-shadow(0 0 5px #b533ff); }

        .main-content { width: 92%; max-width: 380px; z-index: 10; display: flex; flex-direction: column; align-items: center;}

        .header { text-align: center; margin-bottom: 25px; }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .reg { color: #b533ff; text-shadow: 0 0 15px #b533ff; }
        .sub-logo { color: #ffd700; font-size: 10px; margin-top: 5px; font-weight: bold; opacity: 0.8; }

        /* FORM STYLE */
        #form-section { width: 100%; }
        .form-card {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px; border-radius: 20px;
            border: 1px solid rgba(181, 51, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .label { color: #ff4444; font-size: 11px; font-weight: bold; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .input {
            width: 100%; background: #0a0a0f;
            border: 1px solid #222; border-radius: 10px;
            padding: 12px; color: #fff; margin-bottom: 20px;
            box-sizing: border-box; font-size: 14px;
        }

        .btn-proses {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, #4b0082, #b533ff);
            color: white; font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(181, 51, 255, 0.3);
        }

        /* CARD DESIGN FIX */
        #card-section { width: 100%; display: none; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #id-card-visual {
            width: 100%; background: linear-gradient(145deg, #0d0d15, #050508);
            border: 1px solid #b533ff; border-radius: 20px;
            padding: 25px 20px; box-sizing: border-box; text-align: left;
            position: relative; margin-bottom: 25px;
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 30px rgba(181, 51, 255, 0.2);
        }

        /* Watermark Background */
        #id-card-visual::before {
            content: "TEA";
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 120px; font-weight: 900;
            color: rgba(181, 51, 255, 0.03);
            font-family: 'Orbitron'; z-index: 0;
        }

        /* Wadah Gambar/Logo Tengah */
        .card-photo-box {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid #b533ff; overflow: hidden;
            margin-bottom: 15px; z-index: 1; background: #000;
            box-shadow: 0 0 15px rgba(181, 51, 255, 0.4);
        }
        .card-photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .card-header-community { 
            position: absolute; top: 15px; right: 20px;
            font-family: 'Orbitron'; color: #ffd700; font-size: 8px; 
            letter-spacing: 1px; z-index: 1;
        }
        
        .card-main-title { 
            color: #fff; font-family: 'Orbitron', sans-serif; 
            font-size: 16px; font-weight: 700; margin-bottom: 20px;
            border-bottom: 1px solid rgba(181, 51, 255, 0.3);
            padding-bottom: 10px; position: relative; z-index: 1; width: 100%; text-align: center;
        }

        .card-info-wrap { width: 100%; z-index: 1; }
        .card-info-row { display: flex; margin-bottom: 12px; }
        .card-info-label { color: #b533ff; width: 90px; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .card-info-value { color: #fff; font-weight: bold; font-size: 13px; text-transform: uppercase; }

        .btn-download { width: 100%; padding: 15px; border-radius: 50px; background: #00e676; color: #000; border:none; margin-bottom:12px; font-weight:800; cursor:pointer; font-size: 13px; }
        .btn-wa { width: 100%; padding: 15px; border-radius: 50px; background: #fff; color: #000; border:none; font-weight:800; cursor:pointer; font-size: 13px; }

        /* DATABASE */
        .db-section { margin-top: 30px; background: rgba(15, 15, 25, 0.9); padding: 20px; border-radius: 15px; border: 1px solid #222; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        td { padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
        .status-tag { color: #00ff88; font-weight: bold; text-align: right; }
    </style>
</head>
<body>

<div id="tornado-container"><canvas id="tornado"></canvas></div>

<div class="main-content">
    <div class="header">
        <div class="logo-text"><span style="color:#fff">TEA</span> <span class="reg">REGISTRASI</span></div>
        <div class="sub-logo">THE EDITOR OF ASTRONOMY</div>
    </div>

    <div id="form-section">
        <div class="form-card">
            <label class="label">NAMA LENGKAP</label>
            <input type="text" id="nama" class="input" placeholder="Masukkan nama...">
            
            <label class="label">UMUR</label>
            <input type="number" id="umur" class="input" placeholder="Contoh: 17">
            
            <label class="label">STATUS SAAT INI</label>
            <select id="status" class="input">
                <option value="Lainnya">Lainnya</option>
                <option value="Pekerja">Pekerja</option>
                <option value="Pelajar">Pelajar</option>
                <option value="Mahasiswa">Mahasiswa</option>
            </select>

            <label class="label">ID TIKTOK</label>
            <input type="text" id="tiktok" class="input" placeholder="@username">

            <label class="label">ALASAN JOIN</label>
            <textarea id="alasan" class="input" style="height: 60px; resize: none;" placeholder="Apa alasanmu?"></textarea>
            
            <button class="btn-proses" onclick="prosesRegistrasi()">Buat Kartu Identitas</button>
        </div>
    </div>

    <div id="card-section">
        <div id="id-card-visual">
            <span class="card-header-community">TEA COMMUNITY 1</span>
            
            <div class="card-photo-box">
                <img src="https://image2url.com/r2/default/images/1774609049054-7f572d8e-3aab-4ad2-8df1-5d719b0b7fd6.jpg" alt="Logo" crossorigin="anonymous">
            </div>

            <div class="card-main-title">KARTU IDENTITAS TEA</div>
            
            <div class="card-info-wrap">
                <div class="card-info-row"><div class="card-info-label">IDENTITAS:</div><div id="c-nama" class="card-info-value"></div></div>
                <div class="card-info-row"><div class="card-info-label">USIA:</div><div id="c-umur" class="card-info-value"></div></div>
                <div class="card-info-row"><div class="card-info-label">STATUS:</div><div id="c-status" class="card-info-value"></div></div>
                <div class="card-info-row"><div class="card-info-label">ALASAN:</div><div id="c-alasan" class="card-info-value"></div></div>
            </div>
        </div>
        <button class="btn-download" onclick="downloadKartu()">UNDUH KARTU (PNG)</button>
        <button class="btn-wa" onclick="window.open('https://chat.whatsapp.com/FrYPryo1gJb6eHbNhXJRvu', '_blank')">GABUNG GRUP SEKARANG</button>
    </div>

    <div class="db-section">
        <div style="color:#b533ff; font-family:'Orbitron'; font-size:11px; margin-bottom:15px; letter-spacing:1px;">AKTIVITAS PENDAFTAR</div>
        <table>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const db = firebase.initializeApp({ databaseURL: "https://pendaftaran-75335-default-rtdb.asia-southeast1.firebasedatabase.app/" }).database();

    function prosesRegistrasi() {
        const n = document.getElementById('nama').value, u = document.getElementById('umur').value, 
              s = document.getElementById('status').value, t = document.getElementById('tiktok').value,
              a = document.getElementById('alasan').value;
        if(!n || !u) return alert("Mohon lengkapi Nama dan Umur!");

        db.ref('pendaftar').push({ nama: n, umur: u, status: s, tiktok: t, alasan: a, waktu: Date.now() }).then(() => {
            document.getElementById('c-nama').textContent = n;
            document.getElementById('c-umur').textContent = u + " TAHUN";
            document.getElementById('c-status').textContent = s;
            document.getElementById('c-alasan').textContent = a || '-';
            
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('card-section').style.display = 'block';
            window.scrollTo(0, 0);
        });
    }

    function downloadKartu() {
        html2canvas(document.getElementById('id-card-visual'), {backgroundColor:'#050508', scale: 2, useCORS: true}).then(c => {
            const l = document.createElement('a'); l.href = c.toDataURL(); l.download = 'KARTU_TEA.png'; l.click();
        });
    }

    db.ref('pendaftar').limitToLast(10).on('value', snap => {
        const tb = document.getElementById('table-body'); tb.innerHTML = '';
        let data = [];
        snap.forEach(c => { data.push(c.val()); });
        data.reverse().forEach(v => {
            tb.insertAdjacentHTML('beforeend', `<tr><td>${v.nama}</td><td>${v.umur} Thn</td><td class="status-tag">ACTIVE</td></tr>`);
        });
    });

    // TORNADO GALAXY
    const cv = document.getElementById('tornado'), cx = cv.getContext('2d');
    cv.width = 150; cv.height = 150;
    let pts = [];
    class Pt {
        constructor() { this.reset(); }
        reset() { this.y = 150; this.a = Math.random()*Math.PI*2; this.s = 1+Math.random()*1.5; this.c = ['#4b0082','#b533ff','#ff00ff'][Math.floor(Math.random()*3)]; }
        update() { this.y -= this.s; this.a += 0.12; if(this.y<0) this.reset(); }
        draw() {
            let r = 4 + (Math.abs(150-this.y)*0.25), x = 75 + Math.cos(this.a)*r;
            cx.fillStyle = this.c; cx.shadowBlur = 10; cx.shadowColor = this.c;
            cx.beginPath(); cx.arc(x, this.y, 1.3, 0, Math.PI*2); cx.fill();
        }
    }
    for(let i=0; i<180; i++) pts.push(new Pt());
    function anim() { cx.clearRect(0,0,150,150); pts.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(anim); }
    anim();
</script>
</body>
</html>
